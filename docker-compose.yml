services:
  db:
    image: postgres:16-alpine
    container_name: comanda-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: comanda
      POSTGRES_PASSWORD: comanda
      POSTGRES_DB: comanda
    ports:
      - "5433:5432"
    volumes:
      - comanda-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U comanda"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  comanda-db-data:
